<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客流分析行业周报</title>
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #0f4c75;
    --accent2: #1b6ca8;
    --highlight: #e94560;
    --bg: #f7f8fc;
    --card: #ffffff;
    --text: #2d2d2d;
    --muted: #6b7280;
    --border: #e5e7eb;
    --tag-blue: #dbeafe;
    --tag-blue-text: #1d4ed8;
    --tag-green: #d1fae5;
    --tag-green-text: #065f46;
    --tag-orange: #ffedd5;
    --tag-orange-text: #9a3412;
    --tag-purple: #ede9fe;
    --tag-purple-text: #5b21b6;
    --tag-gray: #f3f4f6;
    --tag-gray-text: #374151;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.7;
  }
  a { color: var(--accent2); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    color: white;
    padding: 36px 48px 32px;
  }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    font-size: 12px;
    opacity: 0.75;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .header-meta .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.5); }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
  .header .subtitle { font-size: 13px; opacity: 0.7; }
  .header-tags { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .header-tag {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    color: white;
  }

  /* Quick summary bar */
  .summary-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 48px;
    display: flex;
    gap: 0;
  }
  .summary-item {
    flex: 1;
    padding: 0 20px;
    border-right: 1px solid var(--border);
  }
  .summary-item:first-child { padding-left: 0; }
  .summary-item:last-child { border-right: none; }
  .summary-number { font-size: 22px; font-weight: 700; color: var(--accent); }
  .summary-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* Layout */
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 48px 64px; }

  /* Section */
  .section { margin-bottom: 40px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .section-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .icon-blue { background: var(--tag-blue); }
  .icon-green { background: var(--tag-green); }
  .icon-orange { background: var(--tag-orange); }
  .icon-purple { background: var(--tag-purple); }
  .icon-gray { background: var(--tag-gray); }
  .section-title { font-size: 16px; font-weight: 700; color: var(--primary); }
  .section-count { margin-left: auto; font-size: 12px; color: var(--muted); }

  /* Cards grid */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .cards.wide { grid-template-columns: 1fr; }
  .cards.two-col { grid-template-columns: 1fr 1fr; }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    transition: box-shadow 0.2s;
    position: relative;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .card-company {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 8px; line-height: 1.4; }
  .card-body { font-size: 13px; color: var(--text); line-height: 1.65; }
  .card-footer {
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }
  .card-source { font-size: 11px; color: var(--muted); }
  .card-source a { color: var(--accent2); }

  /* Tags */
  .tag {
    display: inline-flex; align-items: center;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .tag-blue { background: var(--tag-blue); color: var(--tag-blue-text); }
  .tag-green { background: var(--tag-green); color: var(--tag-green-text); }
  .tag-orange { background: var(--tag-orange); color: var(--tag-orange-text); }
  .tag-purple { background: var(--tag-purple); color: var(--tag-purple-text); }
  .tag-gray { background: var(--tag-gray); color: var(--tag-gray-text); }
  .tag-red { background: #fee2e2; color: #991b1b; }

  /* Highlight card (top picks) */
  .highlight-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
  .highlight-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    border-top: 3px solid var(--accent2);
  }
  .highlight-card.red { border-top-color: var(--highlight); }
  .highlight-card.green { border-top-color: #059669; }
  .highlight-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; }
  .highlight-text { font-size: 13px; color: var(--primary); font-weight: 500; line-height: 1.5; }

  /* Global section (simplified) */
  .global-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .global-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .global-region { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
  .global-headline { font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
  .global-body { font-size: 12px; color: var(--muted); line-height: 1.6; }

  /* Compliance (minimal) */
  .compliance-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid #7c3aed;
    border-radius: 6px;
    padding: 14px 18px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .compliance-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .compliance-text { font-size: 13px; color: var(--text); line-height: 1.6; }
  .compliance-text strong { color: var(--primary); }

  /* Next week */
  .nextweek {
    background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 100%);
    border: 1px solid #bfdbfe;
    border-radius: 10px;
    padding: 20px 24px;
  }
  .nextweek-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .nextweek ul { padding-left: 18px; }
  .nextweek li { font-size: 13px; color: var(--text); line-height: 1.8; }

  /* Footer */
  .footer {
    background: var(--primary);
    color: rgba(255,255,255,0.5);
    padding: 24px 48px;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer a { color: rgba(255,255,255,0.6); }

  /* Competitor pill */
  .competitor-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    background: var(--highlight);
    margin-right: 4px;
  }

  @media (max-width: 768px) {
    .header { padding: 24px 20px; }
    .summary-bar { padding: 16px 20px; flex-wrap: wrap; }
    .container { padding: 20px; }
    .highlight-cards { grid-template-columns: 1fr; }
    .global-grid { grid-template-columns: 1fr; }
    .cards.two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-meta">
    <span>Milesight 内部</span>
    <span class="dot"></span>
    <span>客流分析行业周报</span>
    <span class="dot"></span>
    <span>仅供内部参考</span>
  </div>
  <h1>客流分析行业周报 · 第 2 期</h1>
  <div class="subtitle">覆盖周期：2026年06月08日 — 06月14日</div>
  <div class="header-tags">
    <span class="header-tag">竞品动态</span>
    <span class="header-tag">欧洲市场</span>
    <span class="header-tag">技术趋势</span>
    <span class="header-tag">合规简报</span>
    <span class="header-tag">全球视野</span>
  </div>
</div>

<!-- STATS BAR -->
<div class="summary-bar">
  <div class="summary-item">
    <div class="summary-number">10</div>
    <div class="summary-label">监控竞品</div>
  </div>
  <div class="summary-item">
    <div class="summary-number" id="stat-items">—</div>
    <div class="summary-label">本期条目</div>
  </div>
  <div class="summary-item">
    <div class="summary-number">3</div>
    <div class="summary-label">重点关注</div>
  </div>
  <div class="summary-item">
    <div class="summary-number">欧洲</div>
    <div class="summary-label">主要区域</div>
  </div>
</div>

<div class="container">

  <!-- TOP 3 HIGHLIGHTS -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-orange">⚡</div>
      <span class="section-title">本周速览 · 最值得关注的 3 件事</span>
    </div>
    <div class="highlight-cards" id="highlights">
      <!-- filled by JS or static -->
    </div>
  </div>

  <!-- COMPETITOR NEWS -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-blue">🏢</div>
      <span class="section-title">竞品动态</span>
      <span class="section-count" id="count-competitor"></span>
    </div>
    <div class="cards" id="cards-competitor"></div>
  </div>

  <!-- EUROPE MARKET -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-green">📊</div>
      <span class="section-title">欧洲市场动态</span>
      <span class="section-count" id="count-market"></span>
    </div>
    <div class="cards two-col" id="cards-market"></div>
  </div>

  <!-- TECH TRENDS -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-purple">🔬</div>
      <span class="section-title">技术与产品趋势</span>
      <span class="section-count" id="count-tech"></span>
    </div>
    <div class="cards" id="cards-tech"></div>
  </div>

  <!-- COMPLIANCE (minimal) -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-gray">⚖️</div>
      <span class="section-title">合规简报</span>
    </div>
    <div id="compliance-content"></div>
  </div>

  <!-- GLOBAL VIEW -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-gray">🌐</div>
      <span class="section-title">全球视野（非欧洲）</span>
    </div>
    <div class="global-grid" id="global-grid"></div>
  </div>

  <!-- NEXT WEEK -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-blue">📌</div>
      <span class="section-title">下周关注点</span>
    </div>
    <div class="nextweek" id="nextweek"></div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <span>Milesight 客流分析产品团队 · 内部资料请勿外传</span>
  <span>由 Kiro AI 自动整理 · <a href="#">查看往期周报</a></span>
</div>

<script>
// ============================================================
// DATA — 每期替换此处内容即可
// ============================================================
const data = {
  "highlights": [
    {
      "label": "提示",
      "text": "本期信息收集遇到问题，请手动补充内容后重新运行。",
      "type": "blue"
    },
    {
      "label": "周期",
      "text": "本报覆盖 2026年06月08日 — 06月14日",
      "type": "green"
    },
    {
      "label": "竞品预警",
      "text": "自动搜索暂未返回结果，建议手动检查 Xovis 和 Footfallcam 官网。",
      "type": "red"
    }
  ],
  "competitors": [],
  "market": [],
  "tech": [],
  "compliance": "本周无重大合规动态。",
  "global": [
    {
      "region": "北美",
      "headline": "数据收集中",
      "body": "本周北美动态待补充。"
    },
    {
      "region": "亚太",
      "headline": "数据收集中",
      "body": "本周亚太动态待补充。"
    },
    {
      "region": "中东",
      "headline": "数据收集中",
      "body": "本周中东动态待补充。"
    }
  ],
  "nextweek": [
    "持续监控 Xovis、Footfallcam 官网动态",
    "关注欧洲零售客流数据发布",
    "追踪 EU AI Act 合规节点"
  ],
  "issue": 2,
  "period": "2026年06月08日 — 06月14日"
};

// ============================================================
// RENDER
// ============================================================
document.addEventListener('DOMContentLoaded', () => {

  // Highlights
  const hl = document.getElementById('highlights');
  data.highlights.forEach(h => {
    const typeClass = h.type === 'red' ? 'red' : h.type === 'green' ? 'green' : '';
    hl.innerHTML += `
      <div class="highlight-card ${typeClass}">
        <div class="highlight-label">${h.label}</div>
        <div class="highlight-text">${h.text}</div>
      </div>`;
  });

  // Competitor cards
  const cc = document.getElementById('cards-competitor');
  document.getElementById('count-competitor').textContent = data.competitors.length + ' 条';
  data.competitors.forEach(c => {
    cc.innerHTML += `
      <div class="card">
        <div class="card-company"><span class="competitor-dot"></span>${c.company} <span class="tag ${c.tagType}">${c.tag}</span></div>
        <div class="card-title">${c.title}</div>
        <div class="card-body">${c.body}</div>
        <div class="card-footer">
          <span class="card-source">来源：<a href="${c.sourceUrl}" target="_blank">${c.source}</a></span>
        </div>
      </div>`;
  });

  // Market cards
  const mc = document.getElementById('cards-market');
  document.getElementById('count-market').textContent = data.market.length + ' 条';
  data.market.forEach(m => {
    mc.innerHTML += `
      <div class="card">
        <div class="card-company"><span class="tag ${m.tagType}">${m.tag}</span></div>
        <div class="card-title">${m.title}</div>
        <div class="card-body">${m.body}</div>
        <div class="card-footer">
          <span class="card-source">来源：<a href="${m.sourceUrl}" target="_blank">${m.source}</a></span>
        </div>
      </div>`;
  });

  // Tech cards
  const tc = document.getElementById('cards-tech');
  document.getElementById('count-tech').textContent = data.tech.length + ' 条';
  data.tech.forEach(t => {
    tc.innerHTML += `
      <div class="card">
        <div class="card-company"><span class="tag ${t.tagType}">${t.tag}</span></div>
        <div class="card-title">${t.title}</div>
        <div class="card-body">${t.body}</div>
        <div class="card-footer">
          <span class="card-source">来源：<a href="${t.sourceUrl}" target="_blank">${t.source}</a></span>
        </div>
      </div>`;
  });

  // Compliance
  document.getElementById('compliance-content').innerHTML = `
    <div class="compliance-bar">
      <div class="compliance-icon">⚖️</div>
      <div class="compliance-text">${data.compliance}</div>
    </div>`;

  // Global
  const gg = document.getElementById('global-grid');
  data.global.forEach(g => {
    gg.innerHTML += `
      <div class="global-card">
        <div class="global-region">${g.region}</div>
        <div class="global-headline">${g.headline}</div>
        <div class="global-body">${g.body}</div>
      </div>`;
  });

  // Next week
  const nw = document.getElementById('nextweek');
  const total = data.competitors.length + data.market.length + data.tech.length + 1 + data.global.length;
  document.getElementById('stat-items').textContent = total;
  nw.innerHTML = `<div class="nextweek-title">📌 下周重点关注</div><ul>` +
    data.nextweek.map(i => `<li>${i}</li>`).join('') + `</ul>`;
});
</script>
</body>
</html>
